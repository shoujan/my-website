<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JhattaDownload Pro</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#020817;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
height:70px;
background:#071126;
border-bottom:1px solid rgba(255,255,255,0.06);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:sticky;
top:0;
z-index:999;
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:22px;
font-weight:700;
}

.logo-box{
width:42px;
height:42px;
border-radius:14px;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
box-shadow:0 0 20px rgba(37,99,235,0.4);
}

.logo span{
color:#3b82f6;
}

.nav{
display:flex;
gap:15px;
}

.nav button{
background:#101c39;
border:none;
color:#8ea2d4;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
font-size:15px;
transition:0.25s;
}

.nav button:hover{
background:#1d4ed8;
color:white;
transform:translateY(-2px);
}

.nav button.active{
background:#17336d;
color:#3b82f6;
}

.status{
color:#10b981;
font-size:15px;
}

/* WRAPPER */

.wrapper{
max-width:1150px;
margin:auto;
padding:40px 20px;
}

/* HERO */

.hero{
text-align:center;
margin-bottom:35px;
}

.hero p{
color:#7f91b8;
letter-spacing:4px;
font-size:14px;
margin-bottom:8px;
}

.hero h1{
font-size:62px;
font-weight:800;
line-height:1.1;
}

.hero h1 span{
color:#3b82f6;
}

/* CARD */

.main-card{
background:#081224;
border:1px solid rgba(255,255,255,0.06);
border-radius:24px;
overflow:hidden;
margin-bottom:25px;
backdrop-filter:blur(14px);
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.card-header{
padding:20px 24px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
align-items:center;
gap:12px;
font-size:20px;
font-weight:600;
}

.card-header span{
color:#6f82ad;
font-size:15px;
font-weight:400;
}

.content{
padding:24px;
}

.input-box{
display:flex;
gap:12px;
margin-bottom:20px;
}

.input-box input{
flex:1;
height:62px;
background:#101c39;
border:2px solid #22478e;
border-radius:18px;
padding:0 20px;
color:white;
font-size:17px;
outline:none;
transition:0.25s;
}

.input-box input:focus{
border-color:#3b82f6;
box-shadow:0 0 20px rgba(59,130,246,0.35);
}

.input-box input::placeholder{
color:#6c82b0;
}

/* BUTTONS */

.action-buttons{
display:flex;
gap:14px;
margin-bottom:20px;
}

.action-buttons button{
flex:1;
height:58px;
border:none;
border-radius:16px;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:0.25s;
}

.analyze-btn{
background:#2563eb;
color:white;
}

.analyze-btn:hover{
transform:translateY(-2px) scale(1.02);
box-shadow:0 10px 30px rgba(37,99,235,0.4);
}

.next-btn{
background:#111d39;
color:white;
}

.next-btn:hover{
background:#1d4ed8;
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(37,99,235,0.25);
}

/* SUPPORT */

.support{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
font-size:15px;
color:#7f91b8;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-top:25px;
}

.stat-card{
background:#081224;
border:1px solid rgba(255,255,255,0.06);
border-radius:22px;
padding:22px;
transition:0.25s;
backdrop-filter:blur(12px);
}

.stat-card:hover{
transform:translateY(-4px);
border-color:#2563eb;
box-shadow:0 10px 30px rgba(37,99,235,0.25);
}

.stat-card h3{
font-size:15px;
color:#7f91b8;
margin-bottom:12px;
font-weight:500;
}

.stat-card h2{
font-size:42px;
}

/* RESULT */

.result{
margin-top:30px;
display:none;
}

.video-card{
background:#081224;
border:1px solid rgba(255,255,255,0.06);
border-radius:24px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,0.25);
}

.video-card img{
width:100%;
max-height:360px;
object-fit:cover;
}

.video-content{
padding:24px;
}

.video-title{
font-size:24px;
line-height:1.5;
margin-bottom:25px;
}

.quality-title{
font-size:22px;
margin-bottom:15px;
color:#60a5fa;
font-weight:700;
}

.download-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.download-btn{
background:#2563eb;
padding:16px;
border-radius:16px;
text-decoration:none;
text-align:center;
color:white;
font-weight:700;
transition:0.25s;
display:block;
}

.download-btn:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

/* FOOTER */

.footer{
margin-top:80px;
height:85px;
display:flex;
align-items:center;
justify-content:center;
color:#6f82ad;
border-top:1px solid rgba(255,255,255,0.06);
text-align:center;
padding:0 20px;
}

.footer span{
color:#3b82f6;
font-weight:700;
}

/* MOBILE */

@media(max-width:600px){

body{
padding-bottom:40px;
}

.topbar{
display:flex;
height:auto;
padding:14px 16px;
flex-direction:column;
align-items:flex-start;
gap:14px;
}

.logo{
font-size:20px;
}

.nav{
width:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.nav button{
width:100%;
padding:12px 10px;
font-size:13px;
border-radius:14px;
}

.wrapper{
padding:18px 16px;
max-width:100%;
}

.hero{
margin-bottom:22px;
text-align:center;
}

.hero h1{
font-size:30px;
}

.main-card{
border-radius:20px;
margin-bottom:18px;
}

.card-header{
padding:18px;
font-size:16px;
}

.content{
padding:18px;
}

.input-box{
display:block;
margin-bottom:14px;
}

.input-box input{
width:100%;
height:52px;
font-size:15px;
border-radius:14px;
padding:0 16px;
}

.action-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.action-buttons button{
height:50px;
font-size:16px;
border-radius:14px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.stat-card{
padding:18px;
border-radius:18px;
}

.stat-card h2{
font-size:26px;
}

.download-grid{
grid-template-columns:1fr;
}

.footer{
display:none;
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">

<div class="logo-box">
<i class="fa-solid fa-bolt"></i>
</div>

JhattaDownload <span>Pro</span>

</div>

<div class="nav">

<button class="active">
<i class="fa-solid fa-download"></i>
Downloads
</button>

<button>
<i class="fa-brands fa-youtube"></i>
YT + FB
</button>

<button>
<i class="fa-solid fa-gear"></i>
Settings
</button>

</div>

<div class="status">
● Active
</div>

</div>

<div class="wrapper">

<div class="hero">

<p>DEVELOPED BY</p>

<h1>
Shoujan <span>Sapkota</span>
</h1>

</div>

<div class="main-card">

<div class="card-header">

<i class="fa-solid fa-link"></i>

Paste Video URL

<span>· YouTube & Facebook Supported</span>

</div>

<div class="content">

<div class="input-box">

<input
type="text"
id="videoUrl"
placeholder="Paste YouTube or Facebook URL..."
>

</div>

<div class="action-buttons">

<button
class="analyze-btn"
onclick="analyzeVideo()"
>

Analyze

</button>

<button
class="next-btn"
onclick="nextVideo()"
>

Next Video

</button>

</div>

<div class="support">

<div
style="
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
"
>

Supports:

<strong
style="
display:flex;
align-items:center;
gap:8px;
color:white;
"
>

<i
class="fa-brands fa-youtube"
style="
color:#ff0000;
font-size:18px;
"
></i>

YouTube

<i
class="fa-brands fa-facebook"
style="
color:#1877f2;
font-size:18px;
margin-left:8px;
"
></i>

Facebook

</strong>

</div>

<div>
✔ 4K / HD Download
</div>

</div>

</div>

</div>

<div class="stats">

<div class="stat-card">
<h3>Total Downloads</h3>
<h2 id="totalDownloads">0</h2>
</div>

<div class="stat-card">
<h3>Completed</h3>
<h2 id="completedDownloads">0</h2>
</div>

<div class="stat-card">
<h3>Data Saved</h3>
<h2 id="savedData">0 MB</h2>
</div>

<div class="stat-card">
<h3>This Week</h3>
<h2 id="weeklyDownloads">0</h2>
</div>

</div>

<div class="result" id="result"></div>

</div>

<div class="footer">

JhattaDownload Pro · Developed by
<span>&nbsp;Shoujan Sapkota</span>

</div>

<script>

let total =
localStorage.getItem('totalDownloads') || 0;

let completed =
localStorage.getItem('completedDownloads') || 0;

let saved =
localStorage.getItem('savedData') || 0;

let weekly =
localStorage.getItem('weeklyDownloads') || 0;

updateStats();

function updateStats(){

document.getElementById('totalDownloads').innerText = total;
document.getElementById('completedDownloads').innerText = completed;
document.getElementById('savedData').innerText = saved + ' MB';
document.getElementById('weeklyDownloads').innerText = weekly;

}

function downloadComplete(size){

total++;
completed++;
weekly++;

saved =
parseFloat(saved) + parseFloat(size || 5);

saved = saved.toFixed(1);

localStorage.setItem('totalDownloads', total);
localStorage.setItem('completedDownloads', completed);
localStorage.setItem('savedData', saved);
localStorage.setItem('weeklyDownloads', weekly);

updateStats();

}

async function analyzeVideo(){

const url =
document.getElementById('videoUrl').value;

if(!url){

alert('Paste YouTube or Facebook URL');

return;

}

const result =
document.getElementById('result');

result.style.display = 'block';

result.innerHTML = 'Loading video...';

try{

// FACEBOOK

if(
url.includes('facebook.com')
||
url.includes('fb.watch')
){

const response = await fetch(
'https://fdown.isuru.eu.org/info',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
url:url
})
}
);

const data = await response.json();

if(data.status !== 'success'){

result.innerHTML =
'Facebook video not found';

return;

}

const title =
data.video_info.title;

const thumb =
data.video_info.thumbnail;

const formats =
data.available_formats;

let buttons = '';

formats.forEach((item)=>{

buttons += `

<a
class="download-btn"
href="${item.url}"
target="_blank"
onclick="downloadComplete(10)"
>

Download ${item.quality} MP4

</a>

`;

});

result.innerHTML = `

<div class="video-card">

<img src="${thumb}">

<div class="video-content">

<div class="video-title">
${title}
</div>

<div class="quality-title">
Facebook Downloads
</div>

<div class="download-grid">
${buttons}
</div>

</div>

</div>

`;

}

// YOUTUBE

else{

let fixedUrl = url.trim();

if(fixedUrl.includes('youtu.be/')){

const videoId =
fixedUrl.split('youtu.be/')[1].split('?')[0];

fixedUrl =
'https://www.youtube.com/watch?v=' + videoId;

}

const response = await fetch(
'https://ytdownloader.mythicalmonsters45.workers.dev/info?url='
+ encodeURIComponent(fixedUrl)
);

const data = await response.json();

if(!data.success){

result.innerHTML =
'YouTube video not found';

return;

}

const title =
data.video.title;

const thumb =
data.video.thumbnail;

const allFormats = [

...(data.formats.videoWithAudio || []),
...(data.formats.videoOnly || [])

];

let buttons = '';

const added = new Set();

allFormats.forEach((item)=>{

if(
item.extension === 'mp4'
&&
item.url
){

let height = item.height || 0;

let label = '';

if(height >= 2160){
label = '4K';
}
else if(height >= 1440){
label = '2K';
}
else if(height >= 1080){
label = '1080P';
}
else if(height >= 720){
label = '720P';
}
else if(height >= 480){
label = '480P';
}
else{
label = item.quality || 'MP4';
}

if(!added.has(label)){

added.add(label);

buttons += `

<a
class="download-btn"
href="${item.url}"
target="_blank"
onclick="downloadComplete(${item.sizeFormatted?.replace(' MB','') || 5})"
>

Download ${label} MP4

</a>

`;

}

}

});

if(buttons === ''){

buttons =
'No downloadable quality found';

}

result.innerHTML = `

<div class="video-card">

<img src="${thumb}">

<div class="video-content">

<div class="video-title">
${title}
</div>

<div class="quality-title">
YouTube Downloads
</div>

<div class="download-grid">
${buttons}
</div>

</div>

</div>

`;

}

}catch(err){

console.log(err);

result.innerHTML =
'Error loading video';

}

}

function nextVideo(){

document.getElementById('videoUrl').value = '';
document.getElementById('result').style.display = 'none';

}

</script>

</body>
</html>
